# Clippy configuration. Complements [workspace.lints.clippy] in Cargo.toml.
# Mirrors the shared safety discipline used across this developer's other Rust
# projects (vetanvil-backend, polymoney), scoped to what actually applies to a
# CLI/library conversion tool — no HFT/financial-precision rules carried over.

# Cargo.toml denies unwrap_used/expect_used/panic directly. disallowed-methods
# below additionally bans the *data-hiding* patterns that neither of those lints
# catch: silently falling back to a default instead of surfacing a real error.
disallowed-methods = [
  { path = "std::option::Option::unwrap_or", reason = "use an explicit match/if-let with a named fallback, or unwrap_or_else with a computed value — not a silent literal default" },
  { path = "std::option::Option::unwrap_or_default", reason = "do not hide missing data with a type default; return Passthrough/an explicit error instead" },
  { path = "std::result::Result::unwrap_or", reason = "propagate the error or handle it explicitly — do not silently substitute a default" },
  { path = "std::result::Result::unwrap_or_default", reason = "do not hide a parse/conversion error with a type default; this is exactly the kind of ambiguity that must resolve to Passthrough, not a silent default value" },
]

allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-dbg-in-tests = true
