[package]
name = "tooned-index"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "The .tooned/ SQLite project index: scan, fingerprint, cache, invalidate"
categories.workspace = true
readme = "../../README.md"
keywords = ["toon", "index", "sqlite", "cache"]

[lib]
name = "tooned_index"
path = "src/lib.rs"

[dependencies]
tooned-core = { path = "../tooned-core", version = "0.1.0" }
rusqlite = { version = "0.40", features = ["bundled"] }
ignore = "0.4"
blake3 = "1"
thiserror = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
