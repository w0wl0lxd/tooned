name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal command(s) or input that trigger it.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tooned version
      description: Output of `tooned --version`
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
