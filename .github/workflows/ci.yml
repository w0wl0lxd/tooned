name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-rail
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-rail

      - name: Check changed crates
        if: github.event_name == 'pull_request'
        run: cargo rail run --merge-base --surface build -- --all-features --all-targets

      - name: Check all crates
        if: github.event_name == 'push'
        run: cargo rail run --all --surface build -- --all-features --all-targets

  # Required check: stable is the hard merge gate.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-rail
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-rail

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run changed tests
        if: github.event_name == 'pull_request'
        run: cargo rail run --merge-base --surface test

      - name: Run all tests
        if: github.event_name == 'push'
        run: cargo rail run --all --surface test

      - name: Run doc tests
        run: cargo test --doc --all-features

  # Non-blocking canary: visibility into upcoming nightly breakage without
  # ever becoming an accidental required check (continue-on-error is a
  # job-level property here, more robust than relying solely on branch
  # protection to exclude it).
  test-nightly:
    name: Test (nightly canary)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests with nextest
        run: cargo nextest run --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        # Test targets are covered by the test jobs; `clippy.toml` already
        # tries to allow expect/unwrap in tests, but `#[cfg(test)]` helper
        # functions in `tests/` still trigger `expect_used` in current clippy
        # versions, so we lint production code only here.
        run: cargo clippy --all-features -- -D warnings

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.26"

      - name: Check changelog fragments
        run: uvx --from towncrier towncrier check --compare-with origin/main --staged

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-rail
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-rail

      - name: Build changed docs
        if: github.event_name == 'pull_request'
        run: cargo rail run --merge-base --surface docs -- --all-features

      - name: Build all docs
        if: github.event_name == 'push'
        run: cargo rail run --all --surface docs -- --all-features

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benchmarks
        run: cargo bench --all-features -p tooned

      - name: Upload benchmark report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: criterion-report
          path: target/criterion
          if-no-files-found: ignore

  latency:
    name: Latency Guardrail
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run ignored latency guardrail
        run: cargo test --release -p tooned --test hot_path_latency -- --ignored
