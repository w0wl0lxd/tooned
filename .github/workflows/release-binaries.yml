name: Release Binaries

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: tooned

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release -p tooned --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz ${{ env.BIN_NAME }}
          mv ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz "$GITHUB_WORKSPACE"/

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ env.BIN_NAME }}-${{ matrix.target }}.zip ${{ env.BIN_NAME }}.exe
          mv ${{ env.BIN_NAME }}-${{ matrix.target }}.zip "$env:GITHUB_WORKSPACE"/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  docs:
    name: Generate shell completions and man page
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build native tooned
        run: cargo build --release -p tooned

      - name: Generate shell completions and man page
        run: |
          mkdir -p extras/completions extras/man
          for shell in bash zsh fish powershell elvish; do
            ./target/release/tooned completions "$shell" > "extras/completions/tooned.${shell}"
          done
          ./target/release/tooned man > extras/man/tooned.1

      - name: Package extras
        run: tar czf tooned-extras.tar.gz -C extras .

      - name: Upload extras artifact
        uses: actions/upload-artifact@v7
        with:
          name: tooned-extras
          path: tooned-extras.tar.gz
          if-no-files-found: error

  release:
    name: Attach binaries to GitHub Release
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
