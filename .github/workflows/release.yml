name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Verify everything passes before publishing. Pinned to stable — unlike
  # toon-lsp's nightly pin, tooned treats stable as the hard gate everywhere,
  # including release.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2

  # Publish to crates.io. tooned-core first, since tooned-cli and
  # tooned-index both depend on its published version.
  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish tooned-core
        # --allow-dirty: `cargo publish` regenerates Cargo.lock during its
        # verification build, which would otherwise dirty the tree checked out
        # from the tag and abort the publish.
        run: cargo publish -p tooned-core --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish tooned-index
        run: cargo publish -p tooned-index --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish tooned-cli
        run: cargo publish -p tooned-cli --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create GitHub release. Depends only on `verify` (not `publish`) so a
  # crates.io credential problem cannot block the GitHub release.
  github-release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
