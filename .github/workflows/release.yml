name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Verify everything passes before publishing. Pinned to stable — unlike
  # toon-lsp's nightly pin, tooned treats stable as the hard gate everywhere,
  # including release.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2

  # Publish to crates.io in dependency order. The token is stored in the
  # repository as a SOPS-encrypted file and decrypted at runtime with the
  # project age key (kept in a GitHub secret).
  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v2.1.1

      - name: Load crates.io token from SOPS
        run: |
          TOKEN=$(sops --extract '["CARGO_REGISTRY_TOKEN"]' --decrypt secrets/cargo-registry-token.sops.yaml)
          echo "::add-mask::$TOKEN"
          echo "CARGO_REGISTRY_TOKEN=$TOKEN" >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Publish workspace crates
        run: |
          set -e
          publish_one() {
            local crate="$1"
            for attempt in $(seq 1 20); do
              if cargo publish -p "$crate" --allow-dirty; then
                return 0
              fi
              echo "waiting for crates.io index before publishing $crate (attempt $attempt)..."
              sleep 15
            done
            echo "failed to publish $crate" >&2
            return 1
          }
          crates=(
            tooned-parse
            tooned-types
            tooned-json
            tooned-xml
            tooned-csv
            tooned-toml
            tooned-yaml
            tooned-detect
            tooned-toon
            tooned-convert
            tooned-core
            tooned-metrics
            tooned-index
            tooned
          )
          for crate in "${crates[@]}"; do
            publish_one "$crate"
          done

  # Create GitHub release. Depends only on `verify` (not `publish`) so a
  # crates.io credential problem cannot block the GitHub release.
  github-release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
